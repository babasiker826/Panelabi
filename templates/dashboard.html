<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sorgu Paneli</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #151522 100%);
            color: #f0f0f0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background-color: #0d0d0d;
            padding: 15px 20px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            color: #ff0000;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        .logo i {
            color: #ff0000;
            font-size: 28px;
        }

        /* Hamburger Menü */
        .hamburger-menu {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.3s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hamburger-menu:hover {
            transform: scale(1.1);
            color: #ff0000;
        }

        /* Yan Menü */
        .side-menu {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100vh;
            background-color: #111;
            z-index: 1000;
            transition: left 0.3s ease;
            overflow-y: auto;
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.7);
        }

        .side-menu.active {
            left: 0;
        }

        .menu-close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
            z-index: 1001;
        }

        .menu-close-btn:hover {
            background-color: rgba(255, 0, 0, 0.2);
            transform: scale(1.1);
        }

        .menu-header {
            padding: 20px;
            background-color: #000;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .profile-pic {
            width: 50px;
            height: 50px;
            border-radius: 5px;
            border: 2px solid #ff0000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #222;
        }

        .profile-pic i {
            font-size: 30px;
            color: #ff0000;
        }

        .user-info h3 {
            color: #fff;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .user-info p {
            color: #aaa;
            font-size: 12px;
        }

        .menu-content {
            padding: 15px;
        }

        .menu-section {
            margin-bottom: 15px;
            border-bottom: 1px solid #222;
        }

        .menu-section-header {
            color: #ff0000;
            padding: 10px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            font-weight: bold;
        }

        .menu-section-header:hover {
            background-color: rgba(255, 0, 0, 0.1);
        }

        .menu-section-header i {
            font-size: 12px;
            transition: transform 0.3s;
        }

        .menu-items {
            display: none;
            padding-left: 10px;
        }

        .menu-items.active {
            display: block;
        }

        .menu-item {
            padding: 8px 10px;
            color: #ddd;
            display: flex;
            align-items: center;
            transition: all 0.3s;
            font-size: 13px;
            cursor: pointer;
            border-radius: 5px;
            margin: 2px 0;
        }

        .menu-item:hover {
            background-color: rgba(255, 0, 0, 0.1);
            color: #fff;
            padding-left: 15px;
        }

        .menu-item i {
            margin-right: 10px;
            width: 16px;
            color: #ff0000;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 999;
            display: none;
        }

        .menu-overlay.active {
            display: block;
        }

        /* Kayar Yazı */
        .scrolling-text-container {
            background-color: #000;
            padding: 10px 0;
            overflow: hidden;
            border-bottom: 1px solid #333;
        }

        .scrolling-text {
            display: inline-block;
            white-space: nowrap;
            color: #ff0000;
            font-weight: bold;
            font-size: 18px;
            padding-left: 100%;
            animation: scrollText 25s linear infinite;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
        }

        @keyframes scrollText {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* Ana İçerik */
        .container {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
        }

        /* GIF'ler */
        .gif-container {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .gif-item {
            flex: 1;
            min-width: 300px;
            height: 200px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #333;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }

        .gif-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Sorgu Kategorileri */
        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .category-card {
            background: rgba(20, 20, 30, 0.9);
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #333;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .category-card:hover {
            transform: translateY(-5px);
            border-color: #ff0000;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.2);
        }

        .category-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff0000, transparent);
            animation: borderFlow 3s linear infinite;
        }

        @keyframes borderFlow {
            0% { left: -100%; }
            50%, 100% { left: 100%; }
        }

        .category-icon {
            font-size: 40px;
            color: #ff0000;
            margin-bottom: 15px;
        }

        .category-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #fff;
        }

        .category-desc {
            color: #aaa;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .query-list {
            list-style: none;
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .query-list li {
            padding: 6px 0;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .query-list li:hover {
            padding-left: 10px;
            background: rgba(255, 0, 0, 0.1);
        }

        .query-list a {
            color: #ddd;
            text-decoration: none;
            flex: 1;
            font-size: 13px;
        }

        .query-list i {
            color: #ff0000;
            font-size: 12px;
            opacity: 0;
            transition: all 0.3s;
        }

        .query-list li:hover i {
            opacity: 1;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            margin-top: 50px;
            color: #666;
            font-size: 14px;
            border-top: 1px solid #222;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .gif-item {
                min-width: 100%;
                height: 150px;
            }

            .logo {
                font-size: 20px;
            }

            .categories {
                grid-template-columns: 1fr;
            }

            .side-menu {
                width: 250px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <i class="fas fa-search"></i>
            <span>Sorgu Paneli</span>
        </div>
        <button class="hamburger-menu" id="menuToggle">
            <i class="fas fa-bars"></i>
        </button>
    </div>

    <!-- Kayar Yazı -->
    <div class="scrolling-text-container">
        <div class="scrolling-text">
            ⚡ Sorgu Paneli - Tüm sorgular tek yerde! | Her zaman 1numara ;) | 50+ Sorgu Tipi | Hızlı ve Güvenilir ⚡
        </div>
    </div>

    <!-- Yan Menü -->
    <div class="side-menu" id="sideMenu">
        <button class="menu-close-btn" id="menuClose">
            <i class="fas fa-times"></i>
        </button>

        <div class="menu-header">
            <div class="profile-pic">
                <i class="fas fa-user"></i>
            </div>
            <div class="user-info">
                <h3>Misafir Kullanıcı</h3>
                <p><i class="fas fa-circle" style="color: #4CAF50; font-size: 8px;"></i> Aktif</p>
            </div>
        </div>

        <div class="menu-content" id="menuContent">
            <!-- Menü JavaScript ile doldurulacak -->
        </div>
    </div>

    <!-- Menü Overlay -->
    <div class="menu-overlay" id="menuOverlay"></div>

    <!-- Ana İçerik -->
    <div class="container">
        <!-- GIF'ler -->
        <div class="gif-container">
            <div class="gif-item">
                <img src="https://i.ibb.co/FLNGPhQj/Hocam-bana-animasyonlu-taslar-arasinda-yanar-da-i-patlar-gibi-ekrana-donguyle-bi-anda-Sorgu-Panel-N.gif" alt="Sorgu Paneli Gif 1">
            </div>
            <div class="gif-item">
                <img src="https://i.ibb.co/MDBvBYwh/Hocam-bana-animasyonlu-ekrana-bi-anda-yavas-cekimle-Sorgu-panel-N-yazisu-gelsin-yazi-rengi-kirmizi.gif" alt="Sorgu Paneli Gif 2">
            </div>
        </div>

        <!-- Sorgu Kategorileri -->
        <div class="categories" id="categories"></div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>Sorgu Paneli &copy; 2025 - Her zaman 1numara ;)</p>
    </div>

    <script>
        // Sorgu kategorileri ve sorgular
        const categories = [
            {
                name: "🔍 TC Kimlik Sorguları",
                icon: "fa-id-card",
                desc: "TC kimlik numarası ile sorgulamalar",
                queries: [
                    { name: "TC Ad-Soyad Sorgu", key: "tc_adsoyad" },
                    { name: "TC Ad-Soyad (İl ile)", key: "tc_adsoyad_il" },
                    { name: "TC'den GSM Sorgu", key: "tcden_gsm" },
                    { name: "Adres Sorgu", key: "adres_sorgu" },
                    { name: "İş Yeri Sorgu", key: "isyeri_sorgu" }
                ]
            },
            {
                name: "👨‍👩‍👧‍👦 Sülale Sorguları",
                icon: "fa-users",
                desc: "Aile bireyleri ve akraba sorgulamaları",
                queries: [
                    { name: "Sülale - Tümü", key: "sulale_tumu" },
                    { name: "Sülale - Kendisi", key: "sulale_kendisi" },
                    { name: "Sülale - Çocuk", key: "sulale_cocuk" },
                    { name: "Sülale - Eş", key: "sulale_es" },
                    { name: "Sülale - Anne", key: "sulale_anne" },
                    { name: "Sülale - Baba", key: "sulale_baba" },
                    { name: "Sülale - Kardeş", key: "sulale_kardes" },
                    { name: "Sülale - Anneanne", key: "sulale_anneanne" },
                    { name: "Sülale - Babaanne", key: "sulale_babanne" },
                    { name: "Sülale - Dede", key: "sulale_dede" },
                    { name: "Sülale - Amca/Hala", key: "sulale_amca_hala" },
                    { name: "Sülale - Dayı/Teyze", key: "sulale_dayi_teyze" },
                    { name: "Sülale - Kuzen", key: "sulale_kuzen" }
                ]
            },
            {
                name: "📱 GSM Sorguları",
                icon: "fa-mobile-alt",
                desc: "Telefon numarası ile sorgulamalar",
                queries: [
                    { name: "GSM'den TC Sorgu", key: "gsmden_tc" }
                ]
            },
            {
                name: "🚗 Plaka Sorguları",
                icon: "fa-car",
                desc: "Plaka numarası ile sorgulamalar",
                queries: [
                    { name: "Plaka Sorgu", key: "plaka_sorgu" },
                    { name: "Plaka - Ad Sorgu", key: "plaka_ad" },
                    { name: "Plaka - Soyad Sorgu", key: "plaka_soyad" },
                    { name: "Plaka - Ad Soyad", key: "plaka_adsoyad" }
                ]
            },
            {
                name: "💰 Papara Sorguları",
                icon: "fa-wallet",
                desc: "Papara hesap sorgulamaları",
                queries: [
                    { name: "Papara No Sorgu", key: "papara_no" },
                    { name: "Papara Ad Sorgu", key: "papara_ad" },
                    { name: "Papara Ad Soyad", key: "papara_adsoyad" }
                ]
            },
            {
                name: "🔢 Seri No Sorguları",
                icon: "fa-barcode",
                desc: "Seri numarası ile sorgulamalar",
                queries: [
                    { name: "Seri No - TC", key: "serino_tc" },
                    { name: "Seri No - Ad", key: "serino_ad" },
                    { name: "Seri No - Soyad", key: "serino_soyad" },
                    { name: "Seri No - Ad Soyad", key: "serino_adsoyad" },
                    { name: "Seri No - Numara", key: "serino_no" },
                    { name: "Seri No - Ad İl", key: "serino_ad_il" }
                ]
            },
            {
                name: "📊 Vergi Sorguları",
                icon: "fa-file-invoice",
                desc: "Vergi numarası ile sorgulamalar",
                queries: [
                    { name: "Vergi - İsim", key: "vergi_isim" },
                    { name: "Vergi - İlçe", key: "vergi_ilce" },
                    { name: "Vergi - Vergi No", key: "vergi_no" }
                ]
            },
            {
                name: "👨‍🏫 Öğretmen Sorguları",
                icon: "fa-chalkboard-teacher",
                desc: "Öğretmen bilgisi sorgulamaları",
                queries: [
                    { name: "Öğretmen - İlçe", key: "ogretmen_ilce" },
                    { name: "Öğretmen - İl Branş", key: "ogretmen_il_brans" },
                    { name: "Öğretmen - İsim", key: "ogretmen_isim" }
                ]
            },
            {
                name: "💊 Eczane Sorguları",
                icon: "fa-prescription-bottle",
                desc: "Eczane bilgisi sorgulamaları",
                queries: [
                    { name: "Eczane - İl", key: "eczane_il" },
                    { name: "Eczane - Ad", key: "eczane_ad" },
                    { name: "Eczane - İl Ad", key: "eczane_il_ad" }
                ]
            }
        ];

        // Kategorileri ana sayfaya ekle
        const categoriesContainer = document.getElementById('categories');

        categories.forEach(category => {
            const card = document.createElement('div');
            card.className = 'category-card';

            let queriesHTML = '';
            category.queries.forEach(query => {
                queriesHTML += `
                    <li>
                        <a href="/query/${query.key}">${query.name}</a>
                        <i class="fas fa-arrow-right"></i>
                    </li>
                `;
            });

            card.innerHTML = `
                <div class="category-icon">
                    <i class="fas ${category.icon}"></i>
                </div>
                <div class="category-title">${category.name}</div>
                <div class="category-desc">${category.desc}</div>
                <ul class="query-list">
                    ${queriesHTML}
                </ul>
            `;

            categoriesContainer.appendChild(card);
        });

        // Menüyü oluştur
        const menuContent = document.getElementById('menuContent');

        categories.forEach((category, index) => {
            const section = document.createElement('div');
            section.className = 'menu-section';

            let itemsHTML = '';
            category.queries.forEach(query => {
                itemsHTML += `
                    <div class="menu-item" onclick="window.location.href='/query/${query.key}'">
                        <i class="fas fa-angle-right"></i>
                        ${query.name}
                    </div>
                `;
            });

            section.innerHTML = `
                <div class="menu-section-header" onclick="toggleCategory(this)">
                    <span>${category.name}</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div class="menu-items" id="menuCategory${index}">
                    ${itemsHTML}
                </div>
            `;

            menuContent.appendChild(section);
        });

        // Menü kategorilerini aç/kapa
        function toggleCategory(header) {
            const items = header.nextElementSibling;
            const icon = header.querySelector('i');

            items.classList.toggle('active');

            if (items.classList.contains('active')) {
                icon.classList.remove('fa-chevron-down');
                icon.classList.add('fa-chevron-up');
            } else {
                icon.classList.remove('fa-chevron-up');
                icon.classList.add('fa-chevron-down');
            }
        }

        // Hamburger menü işlemleri
        const menuToggle = document.getElementById('menuToggle');
        const sideMenu = document.getElementById('sideMenu');
        const menuOverlay = document.getElementById('menuOverlay');
        const menuClose = document.getElementById('menuClose');

        menuToggle.addEventListener('click', function() {
            sideMenu.classList.add('active');
            menuOverlay.classList.add('active');
        });

        menuClose.addEventListener('click', function() {
            sideMenu.classList.remove('active');
            menuOverlay.classList.remove('active');
        });

        menuOverlay.addEventListener('click', function() {
            sideMenu.classList.remove('active');
            menuOverlay.classList.remove('active');
        });

        // ESC tuşu ile menüyü kapat
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                sideMenu.classList.remove('active');
                menuOverlay.classList.remove('active');
            }
        });

        // İlk kategoriyi açık yap
        setTimeout(() => {
            const firstCategory = document.querySelector('.menu-items');
            if (firstCategory) {
                firstCategory.classList.add('active');
                const firstIcon = document.querySelector('.menu-section-header i');
                if (firstIcon) {
                    firstIcon.classList.remove('fa-chevron-down');
                    firstIcon.classList.add('fa-chevron-up');
                }
            }
        }, 500);
    </script>
</body>
</html>
